<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beSS - Конструктор Глушителей</title>
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --primary: #ff4d4d;
            --bg: #121212;
            --card: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .builder-card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 1px solid #333;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Визуализация */
        .preview-box {
            height: 120px;
            background: #000;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px inset #222;
        }

        .muffler-body {
            background: linear-gradient(180deg, #999 0%, #444 50%, #222 100%);
            border: 1px solid #666;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .pipe {
            position: absolute;
            width: 30px;
            height: 15px;
            background: #555;
            top: 50%;
            transform: translateY(-50%);
            border: 1px solid #444;
        }

        .pipe-in {
            left: -30px;
        }

        .pipe-out {
            right: -30px;
        }

        /* Элементы управления */
        .label-text {
            display: block;
            margin: 15px 0 8px;
            font-size: 14px;
            color: #bbb;
            text-transform: uppercase;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 12px;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input[type="range"] {
            height: 8px;
            appearance: none;
            background: #333;
            outline: none;
            margin-top: 10px;
        }

            input[type="range"]::-webkit-slider-thumb {
                appearance: none;
                width: 20px;
                height: 20px;
                background: var(--primary);
                border-radius: 50%;
                cursor: pointer;
            }

        .price-tag {
            text-align: center;
            margin: 30px 0;
            padding: 15px;
            background: rgba(255,77,77,0.1);
            border-radius: 10px;
            border: 1px dashed var(--primary);
        }

        .price-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
        }

        .order-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }

            .order-btn:hover {
                background: #e60000;
                transform: translateY(-2px);
            }
    </style>
</head>
<body>

    <div id="app" class="builder-card">
        <h2>beSS EXHAUST</h2>

        <!-- Визуал -->
        <div class="preview-box">
            <div class="pipe pipe-in"></div>
            <div class="muffler-body" :style="visualStyle"></div>
            <div class="pipe pipe-out"></div>
        </div>

        <!-- Выбор типа -->
        <span class="label-text">Тип изделия</span>
        <select v-model="typeId" @change="resetLength">
            <option v-for="(item, key) in products" :key="key" :value="key">{{ item.name }}</option>
        </select>

        <!-- Длина -->
        <span class="label-text">Длина корпуса: {{ currentLength }} мм</span>
        <input type="range"
               :min="selectedProduct.minL"
               :max="selectedProduct.maxL"
               step="50"
               v-model.number="currentLength">

        <!-- Цена -->
        <div class="price-tag">
            <div style="font-size: 12px; color: #888;">ИТОГОВАЯ СТОИМОСТЬ</div>
            <div class="price-value">{{ totalPrice.toLocaleString() }} ₽</div>
        </div>

        <button class="order-btn" @click="sendToWhatsApp">ОФОРМИТЬ ЗАКАЗ</button>
    </div>

    <script>const { createApp } = Vue
    createApp({
        data() {
            return {
                typeId: 'oval1',
                currentLength: 250,
                products: {
                    oval1: { name: 'Овальный глушитель 1х1', baseP: 18100, minL: 250, maxL: 600, h: 60, r: 10 },
                    oval2: { name: 'Овальный глушитель 2х2', baseP: 25400, minL: 250, maxL: 600, h: 60, r: 10 },
                    round170: { name: 'Круглый глушитель D170', baseP: 11300, minL: 200, maxL: 550, h: 50, r: 25 },
                    round100: { name: 'Круглый резонатор D100', baseP: 6300, minL: 200, maxL: 550, h: 30, r: 15 }
                }
            }
        },
        computed: {
            selectedProduct() { return this.products[this.typeId]; },
            totalPrice() {
                const p = this.selectedProduct;
                const extraSteps = (this.currentLength - p.minL) / 50;
                return p.baseP + (extraSteps * 700);
            },
            visualStyle() {
                return {
                    width: (this.currentLength * 0.6) + 'px',
                    height: this.selectedProduct.h + 'px',
                    borderRadius: this.selectedProduct.r + 'px'
                };
            }
        },
        methods: {
            resetLength() { this.currentLength = this.selectedProduct.minL; },
            sendToWhatsApp() {
                const phone = "79001234567"; // ЗАМЕНИТЕ НА ВАШ НОМЕР
                const text = `Здравствуйте! Хочу заказать в beSS:\n— ${this.selectedProduct.name}\n— Длина: ${this.currentLength} мм\n— Цена: ${this.totalPrice} руб.`;
                window.open(`https://wa.me{phone}?text=${encodeURIComponent(text)}`);
            }
        }
    }).mount('#app')</script>

</body>
</html>
