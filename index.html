<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>be Solve System — Premium Exhaust Builder</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #ff00ff;
            --primary-glow: rgba(255, 0, 255, 0.4);
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
            --text: #ffffff;
            --accent-gray: #a0a0a0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

            /* Анимированный фон */
            body::before {
                content: "";
                position: fixed;
                top: -50%;
                left: -50%;
                width: 200%;
                height: 200%;
                background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
                z-index: -1;
            }

        .builder-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 30px rgba(255, 0, 255, 0.05);
            position: relative;
        }

        h2 {
            text-align: center;
            font-weight: 900;
            font-size: 32px;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            text-align: center;
            color: var(--accent-gray);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 35px;
            font-weight: 400;
        }

        /* Превью выхлопа */
        .preview-box {
            height: 160px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px inset rgba(255,255,255,0.05);
        }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
            z-index: 1;
            opacity: 0.95;
        }

        /* Элементы управления */
        .control-group {
            margin-bottom: 25px;
        }

        .label-text {
            display: block;
            margin-bottom: 10px;
            font-size: 11px;
            color: var(--accent-gray);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        select {
            width: 100%;
            background: #151515;
            color: #fff;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

            select:focus {
                border-color: var(--primary);
            }

        /* Ползунок */
        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: transparent;
        }

            input[type="range"]::-webkit-slider-runnable-track {
                width: 100%;
                height: 6px;
                background: #222;
                border-radius: 3px;
            }

            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                height: 22px;
                width: 22px;
                border-radius: 50%;
                background: #fff;
                box-shadow: 0 0 15px var(--primary);
                margin-top: -8px;
                cursor: pointer;
                border: 4px solid var(--primary);
            }

        /* Цена */
        .price-tag {
            text-align: center;
            margin: 30px 0;
        }

        .price-value {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Кнопки */
        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
        }

        .btn-main {
            grid-column: span 2;
            background: var(--primary);
            color: #000;
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="builder-card">
        <h2>be Solve System</h2>
        <div class="sub-title">Custom Exhaust Lab</div>

        <div class="preview-box">
            <img id="previewImage" class="preview-image" alt="Превью выбранной конфигурации глушителя">
        </div>

        <div class="control-group">
            <span class="label-text">Конфигурация</span>
            <select id="productSelect" onchange="resetSlider()"></select>
        </div>

        <div class="control-group">
            <div style="display:flex; justify-content: space-between; align-items: baseline;">
                <span class="label-text">Длина корпуса</span>
                <span id="lengthLabel" style="font-weight: 700; color: var(--primary);">250 мм</span>
            </div>
            <input type="range" id="lengthSlider" step="50" oninput="update()">
        </div>

        <div class="price-tag">
            <div class="price-value" id="priceDisplay">0 ₽</div>
        </div>

        <div class="buttons-grid">
            <!-- Кнопка вызова -->
            <a href="tel:+79221714919" class="btn btn-main">Заказать расчет по телефону</a>

            <!-- Ссылки на мессенджеры и ВК -->
            <a href="https://t.me/be_solve_system" target="_blank" class="btn btn-secondary">Telegram</a>
            <a href="https://wa.me/79221714919" target="_blank" class="btn btn-secondary">WhatsApp</a>
            <a href="https://vk.com/write-227779041" target="_blank" class="btn btn-secondary" style="grid-column: span 2;">Написать ВКонтакте</a>
        </div>

    </div>

    <script>
        const products = {
            round170: { name: 'Круглый D170', baseP: 11300, minL: 200, maxL: 550, stepP: 700, h: 65, r: 32 },
            round100: { name: 'Резонатор D100', baseP: 6300, minL: 200, maxL: 550, stepP: 700, h: 40, r: 20 },
            ovalCC: { name: 'Овальный C-C', baseP: 18100, minL: 250, maxL: 550, stepP: 700, h: 60, r: 15 },
            ovalH: { name: 'Овальный H', baseP: 25400, minL: 250, maxL: 550, stepP: 800, h: 70, r: 15 },
            ovalU: { name: 'Овальный U', baseP: 25700, minL: 250, maxL: 550, stepP: 800, h: 65, r: 15 },
            ovalL: { name: 'Овальный L', baseP: 28300, minL: 250, maxL: 550, stepP: 700, h: 65, r: 15 }
        };

        const select = document.getElementById('productSelect');
        const slider = document.getElementById('lengthSlider');
        const label = document.getElementById('lengthLabel');
        const priceDisplay = document.getElementById('priceDisplay');
        const previewImage = document.getElementById('previewImage');

        const CONFIG_IMAGES_DIR = './images/configurations';
        const DEFAULT_CONFIG_IMAGE = 'oval-120x265-1in-1out-center.png';
        const productImages = {
            round170: 'round-d170.png',
            round100: 'resonator-d100.png',
            ovalCC: 'oval-c-c.png',
            ovalH: 'oval-h.png',
            ovalU: 'oval-u.png',
            ovalL: 'oval-l.png'
        };
        const fallbackPreview = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(
            "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 280'><rect width='900' height='280' fill='#111'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='#bbb' font-size='34' font-family='Arial,sans-serif'>Изображение не найдено</text></svg>"
        );
        previewImage.onerror = () => {
            previewImage.src = fallbackPreview;
        };

        for (let key in products) {
            let opt = document.createElement('option');
            opt.value = key;
            opt.innerText = products[key].name;
            select.appendChild(opt);
        }

        function resetSlider() {
            slider.value = products[select.value].minL;
            update();
        }

        function update() {
            const p = products[select.value];
            slider.min = p.minL;
            slider.max = p.maxL;
            const val = parseInt(slider.value);
            label.innerText = `${val} мм`;

            const extraSteps = (val - p.minL) / 50;
            const total = p.baseP + (extraSteps * p.stepP);

            priceDisplay.innerText = total.toLocaleString() + ' ₽';
            const imageName = productImages[select.value] || DEFAULT_CONFIG_IMAGE;
            previewImage.src = `${CONFIG_IMAGES_DIR}/${imageName}`;
            previewImage.alt = `Конфигурация: ${p.name}`;
        }

        select.value = 'ovalCC';
        resetSlider();
    </script>
</body>
</html>
