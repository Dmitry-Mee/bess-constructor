<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>be Solve System - Конструктор</title>
    <style>
        :root {
            --primary: #ff00ff;
            --bg: #0a0a0a;
            --card: #000000;
            --text: #ffffff;
            --muted: #aaaaaa;
            --wa: #25D366;
            --tg: #0088cc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .builder-card {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2);
            border: 2px solid var(--primary);
        }

        h2 {
            text-align: center;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1px;
            font-weight: 900;
        }

        .sub-title {
            text-align: center;
            color: var(--primary);
            font-size: 13px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .preview-box {
            height: 120px;
            background: #050505;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid #222;
        }

        .muffler-body {
            background: linear-gradient(180deg, #444 0%, #111 50%, #000 100%);
            border: 1px solid var(--primary);
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }

        .pipe {
            position: absolute;
            width: 35px;
            height: 16px;
            background: #333;
            top: 50%;
            transform: translateY(-50%);
            border: 1px solid #444;
        }

        .pipe-in {
            left: 0px;
        }

        .pipe-out {
            right: 0px;
        }

        .label-text {
            display: block;
            margin: 12px 0 5px;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            font-weight: bold;
        }

        input, input[type="tel"], select {
            width: 100%;
            background: #111;
            color: white;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 5px;
        }

            input[type="range"] {
                width: 100%;
                height: 6px;
                appearance: none;
                background: #222;
                margin: 15px 0;
            }

                input[type="range"]::-webkit-slider-thumb {
                    appearance: none;
                    width: 20px;
                    height: 20px;
                    background: var(--primary);
                    border-radius: 50%;
                    cursor: pointer;
                    border: 2px solid #000;
                }

        .price-tag {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 0, 255, 0.05);
            border: 1px dashed var(--primary);
        }

        .price-value {
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 15px 5px;
            border: none;
            color: white;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-wa {
            background: var(--wa);
        }

        .btn-tg {
            background: var(--tg);
        }

        .btn:hover {
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="builder-card">
        <h2>be Solve System</h2>
        <div class="sub-title">Exhaust Constructor</div>

        <div class="preview-box">
            <div class="pipe pipe-in"></div>
            <div id="visualBody" class="muffler-body"></div>
            <div class="pipe pipe-out"></div>
        </div>

        <span class="label-text">Ваше Имя</span>
        <input type="text" id="userName" placeholder="Имя" oninput="update()">

        <span class="label-text">Ваш Телефон</span>
        <input type="tel" id="userPhone" placeholder="+7..." oninput="update()">

        <span class="label-text">Тип изделия</span>
        <select id="productSelect" onchange="resetAndStore()"></select>

        <span class="label-text" id="lengthLabel">Длина: 250 мм</span>
        <input type="range" id="lengthSlider" step="50" oninput="update()">

        <div class="price-tag">
            <div style="font-size: 10px; color: var(--muted); margin-bottom: 5px;">ИТОГО</div>
            <div class="price-value" id="priceDisplay">0 ₽</div>
        </div>

        <div class="buttons-grid">
            <a href="#" target="_blank" class="btn btn-wa" id="waLink">WhatsApp</a>
            <a href="#" target="_blank" class="btn btn-tg" id="tgLink">Telegram</a>
        </div>
    </div>

    <script>
        const products = {
            oval1: { name: 'Овальный 1х1', baseP: 18100, minL: 250, maxL: 600, h: 60, r: 15 },
            oval2: { name: 'Овальный 2х2', baseP: 25400, minL: 250, maxL: 600, h: 65, r: 15 },
            round170: { name: 'Круглый D170', baseP: 11300, minL: 200, maxL: 550, h: 55, r: 30 },
            round100: { name: 'Круглый D100 (Резонатор)', baseP: 6300, minL: 200, maxL: 550, h: 35, r: 20 }
        };

        const select = document.getElementById('productSelect');
        const slider = document.getElementById('lengthSlider');
        const label = document.getElementById('lengthLabel');
        const priceDisplay = document.getElementById('priceDisplay');
        const visual = document.getElementById('visualBody');

        const myPhone = "79221714919";
        const myTg = "be_solve_system";

        for (let key in products) {
            let opt = document.createElement('option');
            opt.value = key;
            opt.innerText = products[key].name;
            select.appendChild(opt);
        }

        function resetAndStore() {
            slider.value = products[select.value].minL;
            update();
        }

        function update() {
            const p = products[select.value];
            slider.min = p.minL;
            slider.max = p.maxL;

            const val = parseInt(slider.value);
            label.innerText = 'Длина корпуса: ' + val + ' мм';

            const extraSteps = (val - p.minL) / 50;
            const total = p.baseP + (extraSteps * 700);
            const formattedPrice = total.toLocaleString() + ' ₽';
            priceDisplay.innerText = formattedPrice;

            visual.style.width = (val * 0.45) + 'px';
            visual.style.height = p.h + 'px';
            visual.style.borderRadius = p.r + 'px';

            // Собираем данные
            const name = document.getElementById('userName').value || "Не указано";
            const phoneUser = document.getElementById('userPhone').value || "Не указан";

            const msg = "ЗАКАЗ be Solve System:\n👤 Клиент: " + name + "\n📞 Тел: " + phoneUser + "\n🛠 Изделие: " + p.name + "\n📏 Длина: " + val + " мм\n💰 Цена: " + formattedPrice;
            const encoded = encodeURIComponent(msg);

            // Обновляем ссылки ПРЯМО В ТЕГАХ <a>
            document.getElementById('waLink').href = "https://api.whatsapp.com" + myPhone + "&text=" + encoded;
            document.getElementById('tgLink').href = "https://t.me/" + myTg + "?text=" + encoded;
        }

        update();
    </script>
</body>
</html>
